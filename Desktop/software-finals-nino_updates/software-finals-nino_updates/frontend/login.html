<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paldo Foods | Login</title>

  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-left">
      <div class="brand-box">
        <p class="eyebrow">Fast • Fresh • Local</p>
        <h1>Paldo Foods</h1>
        <p>
          Order your favorite meals, rice bowls, siomai, noodles, and drinks
          with a simple and secure login experience.
        </p>

        <div class="food-card">
          <div>
            <h3>Today’s Favorite</h3>
            <p>Chicken Rice Bowl + Iced Tea</p>
          </div>
          <span>₱134</span>
        </div>
      </div>
    </section>

    <section class="login-right">
      <form id="loginForm" class="login-card">
        <div class="form-header">
          <h2>Welcome Back</h2>
          <p>Login to continue ordering your favorite meals.</p>
        </div>

        <div id="messageBox" class="message hidden"></div>

        <div class="input-group">
          <label for="username">Username or Email</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" id="loginButton">Login</button>

        <p class="test-account">
          Test account: <strong>customer</strong> / <strong>password123</strong>
        </p>
      </form>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
