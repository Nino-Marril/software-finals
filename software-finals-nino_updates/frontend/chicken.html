<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paldo Foods | Chicken Menu</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/design.css" />

  <script src="js/session-guard.js"></script>
  <script src="js/navbar.js" defer></script>
</head>

<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <main class="container py-5">
    <div class="text-center mb-5">
      <h1 class="display-4 fw-bold text-dark">Chicken</h1>
      <p class="lead text-muted mx-auto" style="max-width: 600px;">
        Filipino chicken favorites, freshly prepared.
      </p>
    </div>

    <div class="d-flex justify-content-center mb-4">
      <input
        type="text"
        id="searchInput"
        class="form-control w-50"
        placeholder="Search chicken items..."
      />
    </div>

    <div id="menuGrid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      <!-- JS will inject cards here -->
    </div>
  </main>

  <script>window.MENU_CATEGORY = "chicken";</script>
  <script src="js/menu_search.js"></script>
</body>
</html>
