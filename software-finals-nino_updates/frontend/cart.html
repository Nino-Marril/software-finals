<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paldo Foods | Your Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/design.css">
  <script src="js/session-guard.js"></script>
  <script src="js/navbar.js" defer></script>
</head>
<body class="bg-light">

  <div id="navbar-placeholder"></div>

  <main class="container py-5">
    <h2 class="fw-bold mb-4">Shopping Cart</h2>

    <div class="row g-4">
      <!-- Cart Items List -->
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4 p-3">
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Price</th>
                  <th>Quantity</th>
                  <th>Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="cartTableBody">
                <!-- Items will be injected here -->
              </tbody>
            </table>
          </div>
          <div id="emptyCartMsg" class="text-center py-5 d-none">
            <p class="text-muted">Your cart is currently empty.</p>
            <a href="menu.html" class="btn btn-primary rounded-pill">Back to Menu</a>
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 p-4">
          <h4 class="fw-bold mb-3">Summary</h4>
          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal</span>
            <span id="subtotal">₱0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <span>Delivery Fee</span>
            <span class="text-success">FREE</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between mb-4">
            <span class="fw-bold fs-5">Total</span>
            <span class="fw-bold fs-5 text-primary" id="grandTotal">₱0.00</span>
          </div>
          <button class="btn btn-success w-100 rounded-pill py-2 fw-bold" onclick="checkout()">
            Proceed to Checkout
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/cart.js"></script>
</body>
</html>
