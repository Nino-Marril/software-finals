<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paldo Foods | Pork Menu</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <link rel="stylesheet" href="css/design.css" />
  <script src="js/session-guard.js"></script>
  <link rel="stylesheet" href="login.css" />
  
  <script src="js/navbar.js" defer></script>
</head>

<body>

  <div id="navbar-placeholder"></div>

  <section class="menu-wrapper container my-5">
    <div class="menu-grid">

      <div class="menu-card">
        <img src="https://picsum.photos/seed/pork-adobo/400/240" class="menu-image" />
        <h3>Pork Adobo</h3>
        <p>Rich and savory Filipino favorite</p>
        <span class="price">₱130</span>
      </div>

      <div class="menu-card">
        <img src="https://picsum.photos/seed/lechon-kawali/400/240" class="menu-image" />
        <h3>Lechon Kawali</h3>
        <p>Crispy deep-fried pork belly</p>
        <span class="price">₱150</span>
      </div>

      <div class="menu-card">
        <img src="https://picsum.photos/seed/pork-sinigang/400/240" class="menu-image" />
        <h3>Pork Sinigang</h3>
        <p>Sour tamarind soup with pork</p>
        <span class="price">₱145</span>
      </div>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
