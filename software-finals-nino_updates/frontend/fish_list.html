<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paldo Foods | Fish Menu</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <link rel="stylesheet" href="css/design.css" />
  <script src="js/session-guard.js"></script>
  <link rel="stylesheet" href="login.css" />
  
  <script src="js/navbar.js" defer></script>
</head>

<body>

  <div id="navbar-placeholder"></div>

  <section class="menu-wrapper container my-5">
    <div class="menu-grid">

      <div class="menu-card">
        <img src="https://via.placeholder.com/200x120" class="menu-image" />
        <h3>Fried Bangus</h3>
        <p>Crispy milkfish served hot</p>
        <span class="price">₱120</span>
      </div>

      <div class="menu-card">
        <img src="https://via.placeholder.com/200x120" class="menu-image" />
        <h3>Grilled Tilapia</h3>
        <p>Charcoal grilled with soy sauce</p>
        <span class="price">₱110</span>
      </div>

      <div class="menu-card">
        <img src="https://via.placeholder.com/200x120" class="menu-image" />
        <h3>Fish Fillet</h3>
        <p>Golden fried fillet with tartar sauce</p>
        <span class="price">₱130</span>
      </div>

      <div class="menu-card">
        <img src="https://via.placeholder.com/200x120" class="menu-image" />
        <h3>Sinigang na Isda</h3>
        <p>Sour soup with fresh fish</p>
        <span class="price">₱140</span>
      </div>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
